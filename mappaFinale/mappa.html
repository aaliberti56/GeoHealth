<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard GIS Interattiva - Rete Ospedaliera Napoli</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="isocrone2.js"></script>
    <script src="ospedali.js"></script>

    <style>
        /* Reset e visualizzazione responsive a schermo intero */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 1. PANNELLO STATISTICHE IN ALTO A SINISTRA (Dati Quantitativi GIS) */
        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 300px;
            font-size: 13px;
            line-height: 1.5;
            color: #333;
        }
        .info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #1e293b;
            text-transform: uppercase;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .stat-line {
            margin-bottom: 8px;
        }
        .stat-number {
            font-weight: bold;
            color: #3b82f6;
        }

        /* 2. LEGENDA FLUTTUANTE IN BASSO A SINISTRA */
        .legend {
            background: white;
            padding: 12px 15px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 12px;
            line-height: 20px;
            color: #475569;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 4px;
            text-transform: uppercase;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .legend-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .legend-color-poly {
            width: 16px;
            height: 12px;
            display: inline-block;
            margin-right: 8px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // =================================================================
        // 1. COORDINATE DEL CENTROIDE PROPOSTO (STRIANO)
        // =================================================================
        var latNuovoOspedale = 40.817; 
        var lngNuovoOspedale = 14.571; 

        // Inizializzazione della mappa centrata sul focus dell'analisi strategica
        var map = L.map('map').setView([latNuovoOspedale, lngNuovoOspedale], 11);

        // =================================================================
        // 2. LIVELLI DI BASE (BASEMAPS SELEZIONABILI)
        // =================================================================
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri — Source: Esri, i-cubed, USDA, USGS'
        });

        var darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            attribution: '© CartoDB (Visualizzazione ad alto contrasto per Analisi Termica UHI)'
        });

        // =================================================================
        // 3. STILI E ICONE DEI MARKERS (PERSONALIZZATI)
        // =================================================================
        var redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        var blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [20, 32], iconAnchor: [10, 32], popupAnchor: [1, -30], shadowSize: [32, 32]
        });

        // =================================================================
        // 4. DISEGNO LIVELLO GEOJSON DELLE ISOCRONE (DA QGIS)
        // =================================================================
        var layerIsocrone = L.geoJSON(datiIsocrone, {
            style: {
                "color": "#e63946",      // Colore rosso acceso per evidenziare le linee di confine
                "weight": 2.5,           
                "opacity": 0.85,
                "fillColor": "#fcbf49",  
                "fillOpacity": 0.1
            }
        }).addTo(map);

        // =================================================================
        // 5. CARICAMENTO AUTOMATICO DI TUTTI GLI OSPEDALI ESISTENTI (GEOJSON)
        // =================================================================
        var ospedaliEsistentiLayer = L.geoJSON(datiOspedali, {
            // Assegna l'icona blu a ogni punto trovato nel file ospedali.js
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, {icon: blueIcon});
            },
            // Ciclo iterativo per estrarre in automatico i dati dalla tabella degli attributi
            onEachFeature: function (feature, layer) {
                // Lettura dinamica delle colonne 'name' e 'Temp_2024_1' (LST)
                var nomeOspedale = feature.properties.name || "Presidio Sanitario";
                var temperaturaLST = feature.properties.Temp_2024_1;
                
                // Formatta il numero della temperatura se presente
                var tempFormattata = (typeof temperaturaLST === 'number') ? temperaturaLST.toFixed(2) + " °C" : "Dato non disponibile";

                // Generazione del popup informativo al click
                layer.bindPopup(
                    "<div style='font-family: Arial, sans-serif; font-size: 13px; line-height: 1.4;'>" +
                    "<b>🏥 " + nomeOspedale + "</b><hr style='margin:5px 0; border:0; border-top:1px solid #eee;'>" +
                    "☀️ Temp. Superficiale (LST): <span style='color:#e63946; font-weight:bold;'>" + tempFormattata + "</span>" +
                    "</div>"
                );
            }
        }).addTo(map);

        // =================================================================
        // 6. POSIZIONAMENTO MARKER PROPOSTO (NUOVO OSPEDALE)
        // =================================================================
        var nuovoOspedaleMarker = L.marker([latNuovoOspedale, lngNuovoOspedale], {icon: redIcon}).addTo(map);
        
        nuovoOspedaleMarker.bindPopup(
            "<div style='font-family: Arial, sans-serif; font-size: 13px; line-height: 1.4; min-width: 220px;'>" +
            "<h3 style='margin: 0 0 6px 0; color: #d9534f; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px;'>📍 NUOVO PRESIDIO PROPOSTO</h3>" +
            "<b>Ubicazione:</b> Striano (Area Nolana)<br>" +
            "<b>Metodo Spaziale:</b> Ottimizzazione geometrica tramite algoritmo del Centroide.<br>" +
            "<b>Vantaggio Climatico:</b> Inserimento in un cluster rurale resiliente per mitigare gli impatti legati all'Isola di Calore Urbano (UHI)." +
            "</div>"
        ).openPopup();

        // =================================================================
        // 7. PANNELLO DI GESTIONE DEI LIVELLI (TOP-RIGHT)
        // =================================================================
        var baseMaps = {
            "Mappa Stradale (OSM)": osm,
            "Vista Satellitare": satellite,
            "Contrasto (Analisi Climatica)": darkMap
        };

        var overlayMaps = {
            "Isocrone di Rete (15 min)": layerIsocrone,
            "Presidi Esistenti (Input GIS)": ospedaliEsistentiLayer
        };

        L.control.layers(baseMaps, overlayMaps, {collapsed: false}).addTo(map);

        // =================================================================
        // 8. COSTRUZIONE PANNELLO DATI QUANTITATIVI (TOP-LEFT)
        // =================================================================
        var infoPanel = L.control({position: 'topleft'});
        infoPanel.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info-panel');
            div.innerHTML = '<h2>Analisi Quantitativa GIS</h2>' +
                            '<div class="stat-line"><b>Cluster Target:</b> Area Nolana / Striano</div>' +
                            '<div class="stat-line"><b>Superficie Deficit Territoriale:</b> <span class="stat-number">7.65 km²</span></div>' +
                            '<div class="stat-line"><b>Bacino di Utenza Potenziale:</b> <span class="stat-number">~65.000 ab.</span></div>' +
                            '<div class="stat-line"><b>Criterio Localizzativo:</b> Minimizzazione delle distanze stradali (Golden Hour) fuori dai massimi hotspot termici urbani.</div>' +
                            '<div class="stat-line" style="margin-top: 8px; border-top: 1px dashed #cbd5e1; padding-top: 6px;">' +
                            '<small style="color:#64748b;"><i>Valori geometrici validati integrando i dataset geospaziali Landsat 8/9 LST e Sentinel-5P NO₂.</i></small></div>';
            return div;
        };
        infoPanel.addTo(map);

        // =================================================================
        // 9. COSTRUZIONE LEGENDA DESCRITTIVA (BOTTOM-LEFT)
        // =================================================================
        var legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<h4>Legenda Mappa</h4>' +
                            '<div class="legend-item"><i class="legend-color-dot" style="background: #d9534f;"></i> Ospedale Proposto (Centroide)</div>' +
                            '<div class="legend-item"><i class="legend-color-dot" style="background: #337ab7;"></i> Rete Presidi Esistenti</div>' +
                            '<div class="legend-item"><i class="legend-color-poly" style="border: 2px solid #e63946; background: rgba(252,191,73,0.15);"></i> Confini Isocrone (15 min)</div>';
            return div;
        };
        legend.addTo(map);

    </script>

</body>
</html>
